name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-test:
    name: Lint + unit tests (PowerShell)
    runs-on: windows-latest
    steps:
      # Pinned to a commit SHA (not a moving tag) to prevent supply-chain tampering.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
          Install-Module Pester -MinimumVersion 5.5.0 -Scope CurrentUser -Force -SkipPublisherCheck

      - name: PSScriptAnalyzer (lint)
        shell: pwsh
        run: |
          $r = Invoke-ScriptAnalyzer -Path . -Recurse -Settings ./PSScriptAnalyzerSettings.psd1
          $r | Sort-Object ScriptName, Line | Format-Table -AutoSize
          if ($r.Count) { throw "PSScriptAnalyzer found $($r.Count) issue(s) above." }

      # Smoke-test the real runtime host: the app targets Windows PowerShell 5.1, so
      # dot-source every module under 5.1 to catch syntax / load breakage CI's pwsh 7
      # would miss. -LoadOnly defines the functions and returns without launching the GUI.
      - name: Smoke load modules (Windows PowerShell 5.1)
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          ./Invoke-MailRescue.ps1 -LoadOnly
          'LoadOnly OK under PowerShell ' + $PSVersionTable.PSVersion

      - name: Pester (unit tests)
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.0
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './tests/unit'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $cfg

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # full history so gitleaks can scan all commits

      - name: gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
